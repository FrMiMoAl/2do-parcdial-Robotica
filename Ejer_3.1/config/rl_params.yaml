# Configuración para el agente RL en ROS 2 Jazzy
ros_distro: jazzy
seed: 42
algorithm: PPO

# Parámetros de entrenamiento
total_episodes: 1000
max_steps_per_episode: 500
eval_every_episodes: 25
early_stopping_patience: 10

# Tolerancias y límites físicos
goal_tolerance: 0.30       # Distancia en metros para considerar llegada a la meta
collision_distance: 0.18   # Distancia en metros para considerar colisión
linear_velocity_min: 0.0   # Velocidad lineal mínima (m/s)
linear_velocity_max: 0.35  # Velocidad lineal máxima (m/s)
angular_velocity_min: -1.0 # Velocidad angular mínima (rad/s)
angular_velocity_max: 1.0  # Velocidad angular máxima (rad/s)
lidar_num_beams: 24        # Número de rayos de LiDAR simulados/reales

# Función de recompensa
reward:
  progress_weight: 2.0         # Premio por acercarse a la meta
  heading_weight: 0.5          # Premio por mirar hacia la meta
  linear_velocity_weight: 0.1  # Premio por avanzar rápido
  angular_penalty_weight: 0.05 # Penalización por girar demasiado
  time_penalty: 0.01           # Penalización constante por paso
  collision_penalty: 100.0     # Penalización por chocar
  goal_reward: 100.0           # Premio por llegar a la meta
